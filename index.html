<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckUp Now! - Registre-se</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml;charset=utf-8,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='35' y='0' width='30' height='100' rx='10' fill='%2352D468'/%3E%3Crect x='0' y='35' width='100' height='30' rx='10' fill='%2352D468'/%3E%3Cpath d='M25 55 L40 70 L85 30' stroke='white' stroke-width='12' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" type="image/svg+xml">
    <!-- Geist Font Official CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css">
    
    <!-- CSS Globais e Específicos -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <!-- Decorações de Fundo (Ondas) -->
    <div class="bg-wave bg-wave-tl"></div>
    <div class="bg-wave bg-wave-br"></div>
    <div class="card">
        <!-- Lado Esquerdo: Apresentação -->
        <div class="hero-section">
            <div class="logo-container">
                <!-- SVG do Logo (Cruz médica com checkmark) -->
                <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="35" y="0" width="30" height="100" rx="10" fill="var(--primary)"/>
                    <rect x="0" y="35" width="100" height="30" rx="10" fill="var(--primary)"/>
                    <path d="M25 55 L40 70 L85 30" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <div class="logo-text">CheckUp Now!</div>
            <h1 class="hero-title">Marque suas consultas sem burocracia</h1>
            <p class="hero-subtitle">Agende seus horários com os melhores profissionais do mercado</p>
        </div>
        <!-- Lado Direito: Formulário -->
        <div class="form-section">
            <h2 class="form-title">Registre-se</h2>
            <form action="dashboard.html" method="GET">
                <div class="input-group">
                    <input type="text" placeholder="Nome e sobrenome" required>
                </div>
                <div class="input-group">
                    <input type="email" placeholder="Inserir Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Inserir senha" required>
                </div>
                
                <div class="form-actions">
                    <div class="login-link">
                        Já possui uma conta? <a href="login.html">Faça Login</a>
                    </div>
                    <label class="checkbox-group">
                        <input type="checkbox" id="toggle-password">
                        Visualizar senha
                    </label>
                </div>
                <button type="submit" class="btn-primary">Registrar</button>
            </form>
        </div>
    </div>
    <!-- Scripts -->
    <script src="js/main.js"></script>
</body>
</html>
