<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckUp Now! - Informações Adicionais</title>
    <link rel="icon" href="data:image/svg+xml;charset=utf-8,%3Csvg width='100' height='100' viewBox='0 0 100 100' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='35' y='0' width='30' height='100' rx='10' fill='%2352D468'/%3E%3Crect x='0' y='35' width='100' height='30' rx='10' fill='%2352D468'/%3E%3Cpath d='M25 55 L40 70 L85 30' stroke='white' stroke-width='12' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" type="image/svg+xml">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.css">
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/info.css">
</head>
<body>
    <div class="bg-wave bg-wave-tl"></div>
    <div class="bg-wave bg-wave-br"></div>

    <div class="card card-single">
        <div class="info-header">
            <h1>Informações adicionais</h1>
            <p>Para concluir seu registro preencha os campos abaixo<br>com suas informações adicionais necessárias.</p>
        </div>

        <form action="dashboard.html" method="GET" class="info-form">
            <div class="profile-photo-section">
                <span class="photo-label">Foto de perfil</span>
                <label class="photo-placeholder" title="Adicionar foto">
                    <input type="file" accept="image/*" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </label>
            </div>

            <div class="form-grid">
                <div class="input-group">
                    <input type="text" id="nascimento" inputmode="numeric" pattern="\d{2}/\d{2}/\d{4}" maxlength="10" placeholder="Data de Nascimento" required>
                </div>
                <div class="input-group">
                    <input type="text" inputmode="numeric" pattern="\d*" placeholder="CEP" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                
                <div class="input-group">
                    <input type="text" inputmode="numeric" pattern="\d*" placeholder="CPF" required oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <div class="input-group">
                    <input type="text" id="contato" inputmode="numeric" maxlength="15" placeholder="Contato" required>
                </div>

                <div class="input-group">
                    <select required>
                        <option value="" disabled selected>Sexo</option>
                        <option value="M">Masculino</option>
                        <option value="F">Feminino</option>
                        <option value="O">Outro</option>
                    </select>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Exemplo: Unimed">
                    <span class="help-text">(campo opcional)</span>
                </div>
            </div>

            <div class="checkbox-list">
                <label class="checkbox-group">
                    <input type="checkbox">
                    Possui alguma doença cronica? (diabetes, hipertensão, etc.)
                </label>
                <label class="checkbox-group">
                    <input type="checkbox">
                    Faz uso de medicamentos contínuos?
                </label>
            </div>

            <button type="submit" class="btn-primary btn-center">Enviar</button>
        </form>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
